name: CI — TypeScript & Lint

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  SKIP_ENV_VALIDATION: true

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref }}
            ${{ runner.os }}-turbo-

      - name: Run type check (tracker + admin)
        run: bun run check-types -- --output-logs=new-only

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref }}
            ${{ runner.os }}-turbo-

      - name: Run lint (tracker + admin)
        run: bun run lint -- --output-logs=new-only
